<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Message for Stephanie Kaufman</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --espresso:#1C1410;
  --champagne:#C9A96E;
  --champagne-light:#E8D5B0;
  --warm-white:#FDFAF7;
  --text-muted:#7A6E65;
}
html,body{
  height:100%;
  background:var(--espresso);
  font-family:'DM Sans',sans-serif;
  color:#fff;
  overflow-x:hidden;
}
body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:40px 20px 48px;
}

/* Logo / wordmark at top */
.page-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:300;
  color:rgba(255,255,255,0.7);
  letter-spacing:0.1em;
  margin-bottom:8px;
  text-decoration:none;
  display:block;
  text-align:center;
}
.page-logo span{color:var(--champagne)}

.page-eyebrow{
  font-size:10px;letter-spacing:0.28em;
  color:var(--champagne);text-transform:uppercase;
  font-weight:500;margin-bottom:32px;
  text-align:center;display:block;
}

/* Video container — portrait */
.video-wrap{
  width:100%;
  max-width:380px;
  position:relative;
  border-radius:4px;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,0.6);
}
.video-wrap iframe{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  border:none;
  display:block;
}
/* Portrait ratio from Loom embed */
.video-ratio{
  padding-bottom:217.4129353233831%;
  height:0;
}

/* CTA below video */
.video-cta{
  margin-top:36px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  text-align:center;
}
.cta-label{
  font-size:13px;font-weight:300;
  color:rgba(255,255,255,0.45);
  letter-spacing:0.06em;
}
.cta-btn{
  display:inline-block;
  background:var(--champagne);
  color:var(--espresso);
  padding:15px 36px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:500;
  text-decoration:none;
  border-radius:2px;
  letter-spacing:0.05em;
  transition:background 0.2s;
}
.cta-btn:hover{background:var(--champagne-light)}

/* Divider line */
.divider{
  width:32px;height:1px;
  background:rgba(201,169,110,0.3);
  margin:28px auto 0;
}

/* Footer */
.page-footer{
  margin-top:20px;
  font-size:11px;
  color:rgba(255,255,255,0.2);
  text-align:center;
  letter-spacing:0.06em;
}

/* Fade in on load */
body{opacity:0;animation:fadeIn 0.6s 0.1s ease forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Desktop — constrain width nicely */
@media(min-width:600px){
  .video-wrap{max-width:320px}
}
</style>
</head>
<body>

  <a href="https://stephanie-kaufman-demo.vercel.app/" class="page-logo">
    Stephanie <span>Kaufman</span>
  </a>
  <span class="page-eyebrow">A personal message for you</span>

  <div class="video-wrap">
    <div class="video-ratio"></div>
    <iframe
      src="https://www.loom.com/embed/ff0ecdb471dd4467a1915451927792e4?hide_owner=true&hide_share=true&hide_title=true&hideEmbedTopBar=true"
      frameborder="0"
      webkitallowfullscreen
      mozallowfullscreen
      allowfullscreen>
    </iframe>
  </div>

  <div class="video-cta">
    <span class="cta-label">Ready to see your new website?</span>
    <a href="https://stephanie-kaufman-demo.vercel.app/" class="cta-btn">View Your New Site &rarr;</a>
  </div>

  <div class="divider"></div>
  <p class="page-footer">Stephanie Kaufman &nbsp;·&nbsp; Lang Realty &nbsp;·&nbsp; Boca Raton, FL</p>

</body>
</html>
